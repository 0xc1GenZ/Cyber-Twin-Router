# ================================================
# Cyber-Twin Router — docker-compose.yml
# Professional Fixed v5.0 — Ganache healthcheck-free
# ================================================

services:

  router-twin:
    image: quay.io/frrouting/frr:10.5.3
    container_name: router-twin
    ports:
      - "2200:22"
      - "2300:23"
      - "8000:80"
      - "4430:443"
    volumes:
      - ./configs/frr:/etc/frr
    command: /sbin/init
    networks:
      - cybernet
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - cybernet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ping -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ganache-blockchain:
    build:
      context: .
      dockerfile: Dockerfile.ganache
    container_name: ganache-blockchain
    ports:
      - "8545:8545"
    # NO healthcheck — dependent services use service_started
    networks:
      - cybernet
    restart: unless-stopped

  iot-simulator:
    build:
      context: .
      dockerfile: Dockerfile.iot-simulator
    container_name: iot-simulator
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - cybernet
    restart: unless-stopped

  honeypot:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    container_name: router-honeypot
    ports:
      - "2222:2222"
      - "2323:2323"
      - "8080:8080"
    volumes:
      - ./configs/cowrie:/opt/cowrie/etc
    depends_on:
      ganache-blockchain:
        condition: service_started   # ← changed from service_healthy
    networks:
      - cybernet
    restart: unless-stopped

  cloud-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: cloud-dashboard
    ports:
      - "5000:5000"
    depends_on:
      ganache-blockchain:
        condition: service_started   # ← changed from service_healthy
    networks:
      - cybernet
    restart: unless-stopped

networks:
  cybernet:
    driver: bridge
