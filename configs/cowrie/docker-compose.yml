
services:
  router-twin:
    image: quay.io/frrouting/frr:10.5.3
    container_name: router-twin
    ports:
      - "22:22"
      - "23:23"
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/frr:/etc/frr
    command: /sbin/init
    networks:
      - cybernet
    restart: unless-stopped

  honeypot:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    container_name: router-honeypot
    ports:
      - "2222:2222"
      - "2323:2323"
      - "8080:8080"
    volumes:
      - ./configs/cowrie:/opt/cowrie/etc
    depends_on:
      blockchain:
        condition: service_healthy
    networks:
      - cybernet
    restart: unless-stopped

  iot-simulator:
    build:
      context: .
      dockerfile: Dockerfile.iot-simulator
    container_name: iot-simulator
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - cybernet
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    networks:
      - cybernet
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$SYS/broker/uptime", "-u", "guest", "-P", "guest", "-C", "1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  blockchain:
    image: trufflesuite/ganache:latest
    container_name: ganache-blockchain
    ports:
      - "8545:8545"
    command: [ "--chain.chainId", "1337", "--wallet.seed", "cyber-twin-seed", "--server.port", "8545", "--miner.blockTime", "0" ]
    networks:
      - cybernet
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8545" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  cloud-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: cloud-dashboard
    ports:
      - "5000:5000"
    depends_on:
      blockchain:
        condition: service_healthy
    networks:
      - cybernet
    restart: unless-stopped

networks:
  cybernet:
    driver: bridge
